version: '3.8'

services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: playto_payout
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/playto_payout
      - DB_HOST=db
      - DB_NAME=playto_payout
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DJANGO_SECRET_KEY=dev-secret-key-change-in-production
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: .
    command: python manage.py qcluster
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/playto_payout
      - DB_HOST=db
      - DB_NAME=playto_payout
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DJANGO_SECRET_KEY=dev-secret-key-change-in-production
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  postgres_data: